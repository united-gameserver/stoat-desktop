<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      width: 380px;
      padding: 32px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    input {
      width: 100%;
      background: #1a1d27;
      border: 1px solid #2a2d3d;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }
    input:focus { border-color: #5865f2; }
    input::placeholder { color: #444; }
    button {
      width: 100%;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4752c4; }
    .error {
      color: #f04747;
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Enter your server URL</h1>
    <input type="text" id="url" placeholder="https://chat.example.com" autofocus>
    <button onclick="connect()">Connect</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    function connect() {
      const raw = document.getElementById('url').value.trim().replace(/\/$/, '');
      const errorEl = document.getElementById('error');

      if (!raw) {
        errorEl.textContent = 'Please enter a server URL.';
        return;
      }

      try {
        new URL(raw);
      } catch {
        errorEl.textContent = 'Please enter a valid URL (e.g. https://chat.example.com).';
        return;
      }

      errorEl.textContent = '';
      ipcRenderer.send('gamed-connect', raw);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') connect();
    });
  </script>
</body>
</html>
